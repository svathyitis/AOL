<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Me and My Meowrani</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --bg1:#05060f; --bg2:#111827; --card:rgba(13,18,32,.74); --text:#f8fafc;
    --muted:#a7b0c2; --line:rgba(255,255,255,.14); --accent:#f9d66d; --accent2:#b58cff;
  }
  body.day { --bg1:#f6efe6; --bg2:#e2f0ff; --card:rgba(255,255,255,.72); --text:#1d2230; --muted:#5b6475; --line:rgba(20,20,40,.14); --accent:#ef9b37; --accent2:#7d5cff; }
  body {
    margin:0; min-height:100vh; padding:28px 16px; color:var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at 18% 5%, rgba(181,140,255,.28), transparent 30%),
      radial-gradient(circle at 92% 15%, rgba(249,214,109,.20), transparent 28%),
      linear-gradient(145deg, var(--bg1), var(--bg2));
    transition: background .35s ease, color .35s ease;
  }
  .shell { width:min(94vw, 760px); margin:0 auto; }
  .hero {
    position:relative; overflow:hidden; padding:26px; border:1px solid var(--line); border-radius:30px;
    background:var(--card); backdrop-filter: blur(18px); box-shadow:0 30px 90px rgba(0,0,0,.35);
  }
  .topbar { display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:24px; }
  .brand { letter-spacing:.16em; text-transform:uppercase; color:var(--muted); font-size:12px; }
  .theme-btn { cursor:pointer; border:1px solid var(--line); background:rgba(255,255,255,.08); color:var(--text); border-radius:999px; padding:10px 14px; display:flex; align-items:center; gap:10px; font-weight:700; }
  .cat-icon { width:34px; height:34px; }
  .title { font-size:clamp(32px, 7vw, 66px); line-height:.95; margin:0; letter-spacing:-.06em; }
  .title span { color:var(--accent); }
  .copy { margin:18px 0 22px; color:var(--muted); font-size:clamp(16px,2.5vw,20px); line-height:1.55; max-width:620px; }
  .email-pill { display:inline-flex; align-items:center; gap:10px; color:var(--text); text-decoration:none; padding:12px 16px; border:1px solid var(--line); border-radius:999px; background:rgba(255,255,255,.08); box-shadow: inset 0 1px 0 rgba(255,255,255,.12); }
  .panel { margin-top:26px; padding:14px; border-radius:26px; border:1px solid var(--line); background:rgba(0,0,0,.20); }
  body.day .panel { background:rgba(255,255,255,.38); }
  .portrait-wrap { position:relative; overflow:hidden; border-radius:20px; border:1px solid var(--line); background:#111; }
  canvas#portrait { display:block; width:100%; height:auto; image-rendering:pixelated; image-rendering:crisp-edges; background:#222; }
  .portrait-wrap::after { content:""; position:absolute; inset:0; pointer-events:none; background:linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px); background-size:100% 5px; mix-blend-mode:soft-light; }
  #pacman { position:absolute; width:42px; height:42px; left:-14%; top:8%; opacity:0; z-index:5; pointer-events:none; filter:drop-shadow(0 0 14px rgba(249,214,109,.7)); transition:opacity .2s ease; }
  #pacman::before { content:""; position:absolute; inset:0; border-radius:50%; background:conic-gradient(from 36deg, transparent 0 72deg, var(--accent) 72deg 360deg); }
  #pacman.chomp::before { animation:chomp .22s infinite alternate; }
  @keyframes chomp { from { clip-path:polygon(50% 50%,100% 14%,100% 86%,50% 50%,0 0,0 100%,100% 100%,100% 0); } to { clip-path:circle(50%); } }
  #sparkles { position:absolute; inset:0; pointer-events:none; z-index:4; }
  #sparkles i { position:absolute; width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 16px var(--accent); animation:pop .85s ease-out forwards; }
  @keyframes pop { to { transform:translateY(-24px) scale(0); opacity:0; } }

  .hero::before { content:""; position:absolute; inset:-2px; pointer-events:none; background:linear-gradient(120deg, rgba(255,255,255,.18), transparent 20%, rgba(181,140,255,.22), transparent 60%, rgba(249,214,109,.18)); opacity:.75; mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude; padding:1px; border-radius:30px; }
  .hero::after { content:"AMP MODE"; position:absolute; right:-28px; top:92px; transform:rotate(14deg); font-weight:950; font-size:clamp(42px, 10vw, 88px); letter-spacing:-.08em; color:rgba(255,255,255,.045); pointer-events:none; }
  .title { background:linear-gradient(90deg, var(--text), var(--accent), var(--accent2)); -webkit-background-clip:text; background-clip:text; color:transparent; text-wrap:balance; }
  .title span { color:transparent; }
  .email-pill { position:relative; overflow:hidden; }
  .email-pill::after { content:""; position:absolute; inset:0; background:linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent); transform:translateX(-120%); animation:shine 3s infinite; }
  @keyframes shine { 55%,100% { transform:translateX(130%); } }
  .panel-title { display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; margin:0 0 14px; }
  .panel-title h2 { margin:0; font-size:clamp(24px,5vw,42px); letter-spacing:-.055em; line-height:1; }
  .panel-title small { color:var(--muted); font-weight:800; border:1px solid var(--line); border-radius:999px; padding:8px 10px; background:rgba(255,255,255,.07); }
  .panel { position:relative; overflow:hidden; }
  .panel::before { content:""; position:absolute; inset:auto -10% -35% -10%; height:180px; background:radial-gradient(circle, rgba(181,140,255,.28), transparent 62%); pointer-events:none; }
  .portrait-wrap { box-shadow:0 18px 60px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.05) inset; }
  @media (max-width:520px){ body{padding:14px 10px}.hero{padding:18px;border-radius:24px}.topbar{align-items:flex-start}.theme-btn{padding:9px 11px} }

</style>
</head>

      </section>
    </section>

const canvas = document.getElementById("portrait");
canvas.width = W;
canvas.height = H;
const ctx = canvas.getContext("2d", { alpha: false });
const image = ctx.createImageData(W, H);
const data = image.data;

const rgbPalette = palette.map(hex => [
  parseInt(hex.slice(1, 3), 16),
  parseInt(hex.slice(3, 5), 16),
  parseInt(hex.slice(5, 7), 16)
]);

let p = 0;
for (let i = 0; i < pixelsHex.length; i += 2) {
  const idx = parseInt(pixelsHex.slice(i, i + 2), 16);
  const color = rgbPalette[idx];
  data[p++] = color[0];
  data[p++] = color[1];
  data[p++] = color[2];
  data[p++] = 255;
}
ctx.putImageData(image, 0, 0);

const originalImageData = ctx.getImageData(0, 0, W, H);
let eatTimer = null;
let eating = false;
const pacman = document.getElementById('pacman');
const stage = document.querySelector('.portrait-wrap');
const sparkleLayer = document.getElementById('sparkles');

function sparkle(x, y) {
  const s = document.createElement('i');
  s.style.left = x + '%';
  s.style.top = y + '%';
  s.style.animationDelay = (Math.random() * 0.25) + 's';
  sparkleLayer.appendChild(s);
  setTimeout(() => s.remove(), 950);
}

function resetPortrait() {
  if (eatTimer) clearInterval(eatTimer);
  eating = false;
  ctx.putImageData(originalImageData, 0, 0);
  pacman.style.opacity = 0;
  pacman.style.left = '-14%';
  pacman.style.top = '8%';
  pacman.classList.remove('chomp');
}

function startEating() {
  if (eating) return;
  resetPortrait();
  eating = true;
  pacman.style.opacity = 1;
  pacman.classList.add('chomp');

  const rows = 44;
  const stepsPerRow = 38;
  const biteR = 4; // tiny bites so it feels like one dot at a time
  let step = 0;
  const total = rows * stepsPerRow;

  eatTimer = setInterval(() => {
    const row = Math.floor(step / stepsPerRow);
    const col = step % stepsPerRow;
    const forward = row % 2 === 0;
    const x = forward
      ? Math.round((col / (stepsPerRow - 1)) * (W + biteR * 2) - biteR)
      : Math.round(((stepsPerRow - 1 - col) / (stepsPerRow - 1)) * (W + biteR * 2) - biteR);
    const y = Math.round(((row + 0.5) / rows) * H);

    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, biteR, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    const leftPct = (x / W) * 100;
    const topPct = (y / H) * 100;
    pacman.style.left = `calc(${leftPct}% - 20px)`;
    pacman.style.top = `calc(${topPct}% - 20px)`;
    pacman.style.transform = forward ? 'scaleX(1)' : 'scaleX(-1)';
    if (step % 7 === 0) sparkle(Math.max(4, Math.min(96, leftPct)), Math.max(4, Math.min(96, topPct)));

    step++;
    if (step >= total) {
      clearInterval(eatTimer);
      eating = false;
      pacman.classList.remove('chomp');
      pacman.style.opacity = 0;
      setTimeout(startEating, 1800);
    }
  }, 24);
}

// Pac-Man starts by itself. No buttons, no clicks.
window.addEventListener('load', () => {
  setTimeout(startEating, 900);
});

document.getElementById('themeToggle').addEventListener('click', () => {
  document.body.classList.toggle('day');
});
